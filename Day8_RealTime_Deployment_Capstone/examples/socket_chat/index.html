<!DOCTYPE html>
<html>
<head>
    <title>Socket.io Chat</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        #messages { list-style-type: none; padding: 0; max-height: 400px; overflow-y: auto; background: white; border-radius: 8px; border: 1px solid #ddd; }
        #messages li { padding: 10px 15px; border-bottom: 1px solid #eee; }
        #messages .time { font-size: 0.8em; color: #888; margin-right: 10px; }
        #form { display: flex; margin-top: 10px; }
        #input { flex-grow: 1; padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>
    <h1>Real-Time Chat 💬</h1>
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message..." /><button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        socket.on('chat message', (msg) => {
            const item = document.createElement('li');
            item.innerHTML = `<span class="time">${msg.time}</span> <strong>${msg.id.substr(0,4)}</strong>: ${msg.text}`;
            messages.appendChild(item);
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
