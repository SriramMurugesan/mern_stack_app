<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 Mini App: Vibes & Counter</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-color: #6c5ce7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: all 0.4s ease;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; }

        .counter-display {
            font-size: 4rem;
            font-weight: 800;
            margin: 20px 0;
            color: var(--accent-color);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-increment { background: var(--accent-color); color: white; }
        .btn-theme { background: #eee; color: #333; }

        /* Dark Mode Utility */
        body.dark {
            --bg-color: #1a1a1a;
            --text-color: #f5f5f5;
            --accent-color: #a29bfe;
        }
        body.dark .container { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Theme & Counter</h1>
        <div class="counter-display" id="counter-val">0</div>
        
        <div class="btn-group">
            <button class="btn-increment" id="inc-btn">Increase count</button>
            <button class="btn-theme" id="theme-btn">Switch Theme</button>
        </div>

        <p id="msg">Keep pushing!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
